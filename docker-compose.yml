services:
  mongo:
    image: mongo:7.0
    container_name: elev9-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elev9-api
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/elev9

volumes:
  mongo-data:
