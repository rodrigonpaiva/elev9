name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Test API
        run: npm exec nx test api

      - name: Build API
        run: npm exec nx build api

      - name: Build shared packages
        run: |
          npm exec nx build types
          npm exec nx build api-client

      - name: Build mobile
        run: npm exec nx build mobile

      - name: Export mobile
        run: npm exec nx export mobile
